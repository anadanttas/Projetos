<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trybewarts</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!--Header-->
    <header class="header">
        <img src="/images/trybewarts-header-logo.svg" alt="Logo Trybe" class="trybewarts-header-logo">
    
    <h1 class="trybewarts-header-title">Trybewarts</h1>
    <form action="" method="get" class="trybewarts-login">
    <input type="text" name="login-email" placeholder="Login" id="email" />
    <input type="text" name="password" placeholder="Senha" id="password" />
    <button id="button">Entrar</button>
    </form>
    </header>
    <main>
        <form action="" method="get" id="evaluation-form">
            <div>
            <input type="text" value="" id="input-name" placeholder="Nome">
            <input type="text" value="" id="input-lastname" placeholder="Sobrenome">
            </div>
<!--No requisito 11 do projeto, pede para deixar tanto o emial quanto as casas um do lado do outro, por isso
coloquei dentro de uma div só, dessa forma o display deixa de ser flex e consequentemente deixa os elementos um do lado do outro-->
            <div>
            <input type="text" value="" id="input-email" placeholder="Email">

                <select name="house" value="" id="house">
                    <option id="gitnoria-house" value="Gitnória">Gitnória</option>
                    <option id="reactpuff-house" value="Reactpuff">Reactpuff</option>
                    <option id="covirnode-house" value="Corvinode">Corvinode</option>
                    <option id="pytherina-house" value="Pytherina">Pytherina</option>
                </select>
                <hr>
                <section>
                    <div>
                        <label id="Label-family">Qual sua família?</label>
                        <div>
                            <div>
                            <input type="radio" name="family" id="Frontend" value="Frontend">
                            <label for="Frontend">Família Frontend</label></div>
                            <div>
                            <input type="radio" name="family" id="Backend" value="Backend">
                            <label for="Backend">Família Backend</label></div>
                            <div>
                            <input type="radio" name="family" id="FullStack" value="FullStack">
                            <label for="FullStack">Família FullStack</label></div>
                          
                        </div> 
                    </div>
                    <!--Construindo o formulário-->
                    <label id="label-content">Qual conteúdo você está com mais vontade de aprender?</label>
                    <div>
                        <!--HoFs-->
                        <label class="subject">
                            <input  for="HoFs" name="HoFs" id="HoFs" type="checkbox" value="HoFs">HoFs</label>
                        <!--Jest-->
                        <label class="subject">
                            <input for="Jest" name="Jest" id="Jest" type="checkbox" value="Jest">Jest</label>
                        <!--Promises-->
                        <label class="subject">
                            <input  for="Promises" name="Promises" id="Promises" type="checkbox" value="Promises">Promises</label>
                        <!--React-->
                        <label class="subject">
                            <input for="React" type="checkbox" name="React" id="React" value="React">React</label>
                        <!--SQL-->
                        <label class="subject">
                            <input for="SQL" name="SQL" id="SQL" type="checkbox" value="SQL">SQL</label>
                        <!--Python-->
                        <label class="subject">
                            <input for="Python" name="Python" id="Python" type="checkbox" value="Python">Python</label>
                    </div>
                    <section>
                        <label id="label-rate">Como você avalia a Trybewarts?</label>
                        <label><input type="radio" name="rate" value="1">1</label>
                        <label><input type="radio" name="rate" value="2">2</label>
                        <label><input type="radio" name="rate" value="3">3</label>
                        <label><input type="radio" name="rate" value="4">4</label>
                        <label><input type="radio" name="rate" value="5">5</label>
                        <label><input type="radio" name="rate" value="6">6</label>
                        <label><input type="radio" name="rate" value="7">7</label>
                        <label><input type="radio" name="rate" value="8">8</label>
                        <label><input type="radio" name="rate" value="9">9</label>
                        <label><input type="radio" name="rate" value="10">10</label>
                        </label>
                    </section>
                </div>
                <div id="textarea-header">
                    <label for="textarea" class="textarea">Deixe seu comentário:</label>
                    <p id="counter">500</p>
                </div>
                <textarea name="textarea" id="textarea" cols="30" rows="10" maxlength="500"></textarea>
                <!--Div para encapsular o label e checkbox que são relacionados e por um ao lado pelo flex no css.-->
                <div id="checkbox-agreement">
                    <label for="" id="label-infos">Você concorda com o uso das informações acima?</label>
                    <input type="checkbox" name="agreement" id="agreement">
                </div>
                <button type="submit" disabled id="submit-btn">Enviar</button>
                </form>
                <img src="/images/trybewarts-colored.svg" alt="trybewarts-logo" id="trybewarts-forms-logo">
    </main>
    <!--Criando um footer e estilizando para o requisito 19-->
    <footer>Direitos reservados à Trybewarts©</footer>
</body>
</html>
